[screen]
width = 120
height = 40
fps = 15

[layering]
order = ["animation", "systemd"]

[overlay]
region_y = 24
region_h = 16

[animation]
manifest = "/var/lib/boot-ui/intro/manifest.json"

[handoff]
write_state = "/run/boot-ui/state.json"

[video]
source = "/var/lib/boot-ui/intro/video.mp4"
player = "mpv"
args = ["--fullscreen"]

[sddm]
video_background_enabled = false
theme = "breeze"
theme_root = "/usr/share/sddm/themes"
video_path = "/var/lib/boot-ui/intro/video.mp4"
launch_external_player = true

[interaction]
force_text_mode = false
stop_combo = "ctrl+q"
any_key_to_login = false
start_login_on_stop = false

[debug]
log_file = "/var/log/boot-ui/boot-ui.log"
history_file = "/var/log/boot-ui/boot-ui-history.log"
export_enabled = true
export_dir = "/var/lib/boot-ui/debug"
flush_every = 64
log_frame_events = true
log_overlay_events = true
cleanup_enabled = true
max_artifact_age_days = 14
max_artifacts = 40
max_log_size_mb = 32
max_history_size_mb = 16
